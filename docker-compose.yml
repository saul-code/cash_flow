services:
    db:
        image: postgres:15
        container_name: cash_flow_db
        environment:
            - POSTGRES_USER=cashflow # O el usuario que hayas elegido
            - POSTGRES_PASSWORD=cashflow
            - POSTGRES_DB=cashflow_db
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cashflow} -d ${POSTGRES_DB:-cashflow_db}"]
            interval: 5s
            timeout: 5s
            retries: 5

    app:
        build: .
        container_name: cash_flow_app
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL: postgresql://${POSTGRES_USER:-cashflow}:${POSTGRES_PASSWORD:-cashflow}@db:5432/${POSTGRES_DB:-cashflow_db}
            DEBUG: ${DEBUG:-true}
        ports:
            - "8050:8050"
        volumes:
            - .:/app
        command: python app.py

volumes:
    postgres_data:
